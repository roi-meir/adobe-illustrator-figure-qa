name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit:
    name: Node unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core.generated.jsx
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit
